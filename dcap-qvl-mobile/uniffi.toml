[bindings.kotlin]
package_name = "network.phala.dcapqvl"
cdylib_name = "dcap_qvl_mobile"

[bindings.swift]
# The Swift code generated by uniffi-bindgen ships in the `DcapQvl` SwiftPM
# target. It imports the C symbols via the `DcapQvlFFI` module provided by the
# XCFramework's `module.modulemap`.
module_name = "DcapQvl"
ffi_module_name = "DcapQvlFFI"
cdylib_name = "dcap_qvl_mobile"

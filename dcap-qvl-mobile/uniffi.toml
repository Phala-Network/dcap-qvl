[bindings.kotlin]
package_name = "network.phala.dcapqvl"
cdylib_name = "dcap_qvl_mobile"

[bindings.swift]
# The Swift code generated by uniffi-bindgen ships in the `DcapQvl` SwiftPM
# target. UniFFI automatically derives the C-FFI module name as
# `<module_name>FFI` (→ `DcapQvlFFI`), which is what the XCFramework
# `module.modulemap` exposes — do NOT set `ffi_module_name` explicitly or
# uniffi will double-append "FFI".
module_name = "DcapQvl"
cdylib_name = "dcap_qvl_mobile"
